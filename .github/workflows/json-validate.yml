name: Validate JSON on PR

on:
  pull_request:
    paths:
      - 'cardDetails.json'   # Sirf cardDetails.json ke liye

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JSON validator
        run: npm install -g jsonlint

      - name: Find and validate JSON files
        id: validate
        run: |
          echo "Checking JSON files..."
          CHANGED_FILES=$(git diff --name-only ${{ github.sha }} ${{ github.event.pull_request.base.sha }} | grep '.json$' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No JSON files changed."
            exit 0
          fi

          echo "$CHANGED_FILES" | while read file; do
            echo "Validating $file ..."
            jsonlint "$file" -q || exit 1
          done

      - name: Comment on PR if validation fails
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ❌ JSON validation failed!  
            Please fix syntax errors in cardDetails.json before merging.
